<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MAANV.AI</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 3.5rem;
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 450px; /* Reduced slightly for modern proportion */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        .login-header h2 { font-family: 'Outfit', sans-serif; font-size: 2.2rem; margin-bottom: 0.5rem; }
        .login-header p { color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1.05rem; }
        
        /* Social Buttons */
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.9rem;
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .social-btn img {
            width: 20px;
            height: 20px;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }
        .divider span { padding: 0 1rem; }

        .form-group { text-align: left; margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }
        .form-group input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            padding: 1rem 1.2rem; border-radius: 12px; color: var(--text-main); font-family: inherit;
            font-size: 1rem; outline: none; transition: all 0.3s ease;
        }
        .form-group input:focus { border-color: var(--primary-color); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .submit-btn {
            background: var(--primary-gradient); border: none; color: white; padding: 1rem;
            border-radius: 50px; font-weight: 600; font-size: 1.1rem; cursor: pointer; width: 100%; transition: transform 0.2s, box-shadow 0.2s; margin-top: 1rem;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }
        .auth-footer { margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem; }
        .auth-footer a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
        .back-link { position: absolute; top: 2rem; left: 2rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; font-weight: 500; transition: color 0.3s; z-index: 20; }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    <a href="/" class="back-link">← Return to Homepage</a>
    
    <div class="login-wrapper">
        <div class="login-card">
            <a href="/" class="logo" style="text-decoration: none; color: inherit; display: block; margin-bottom: 2rem; font-size:1.5rem; font-weight:800; font-family:'Outfit'">MAANV<span style="color:var(--primary-color)">.AI</span></a>
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your AI Co-founder.</p>
            </div>
            
            <!-- Social Login Modals -->
            <div class="social-login">
                <button class="social-btn google-btn" onclick="mockLogin()"><img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google"> Continue with Google</button>
                <button class="social-btn apple-btn" onclick="mockLogin()"><img src="https://www.svgrepo.com/show/511330/apple-173.svg" alt="Apple" style="filter: invert(1);"> Continue with Apple</button>
                <button class="social-btn github-btn" onclick="mockLogin()"><img src="https://www.svgrepo.com/show/512317/github-142.svg" alt="GitHub" style="filter: invert(1);"> Continue with GitHub</button>
            </div>
            
            <div class="divider"><span>OR</span></div>
            
            <form onsubmit="event.preventDefault(); mockLogin();">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@startup.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn">Sign In with Email</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="#" onclick="mockLogin()">Create one here</a>
            </div>
        </div>
    </div>

    <!-- Frontend logic mock for UI feedback -->
    <script>
        function mockLogin() {
            // Drops a browser flag to 'remember' the user is logged in
            // so we can unlock the chat box on the home page!
            localStorage.setItem("user_logged_in", "true");
            window.location.href = "/";
        }
    </script>
</body>
</html>
